<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Da Silva Mecánica - Visualizador de Documentos</title>
  <link rel="icon" type="image/png" href="logo2.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #f97316; /* Naranja premium */
      --accent-hover: #ea580c;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border-color: #334155;
    }
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    /* Partículas de fondo sutiles */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.1) 0%, rgba(15, 23, 42, 0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 2;
      background-color: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .logo-img {
      height: 60px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }
    .brand-name {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .brand-sub {
      color: var(--accent-color);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-weight: 600;
    }
    .status-text {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    /* Spinner animado automotriz / radial */
    .spinner-box {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 10px 0;
    }
    .spinner-outer {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top-color: var(--accent-color);
      border-bottom-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    }
    .spinner-inner {
      position: absolute;
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      border: 3px solid transparent;
      border-left-color: #06b6d4; /* Cian de diagnóstico */
      border-right-color: #06b6d4;
      border-radius: 50%;
      animation: spinReverse 1.2s linear infinite;
    }
    .spinner-center {
      position: absolute;
      width: 30%;
      height: 30%;
      top: 35%;
      left: 35%;
      background-color: var(--accent-color);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--accent-color);
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinReverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    .btn-direct {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(249, 115, 22, 0.4);
      transition: all 0.2s ease;
      margin-top: 10px;
    }
    .btn-direct:hover {
      background-color: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5);
    }
    .btn-direct:active {
      transform: translateY(0);
    }
    .footer-note {
      font-size: 11px;
      color: #64748b;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="container">
    <div class="logo-container">
      <img src="logo.png" alt="Da Silva Mecánica Logo" class="logo-img" onerror="this.style.display='none';">
      <div class="brand-name">DA SILVA</div>
      <div class="brand-sub">Servicio Mecánico</div>
    </div>

    <div class="spinner-box">
      <div class="spinner-outer"></div>
      <div class="spinner-inner"></div>
      <div class="spinner-center"></div>
    </div>

    <div class="status-text" id="status-message">
      Preparando su documento...
    </div>

    <a href="#" class="btn-direct" id="btn-direct-link" style="display: none;">
      Abrir documento directamente
    </a>

    <div class="footer-note">
      Da Silva Mecánica &copy; 2026. Todos los derechos reservados.
    </div>
  </div>

  <script>
    // Obtener parámetros de búsqueda
    const urlParams = new URLSearchParams(window.location.search);
    const filename = urlParams.get('file');

    const statusMsg = document.getElementById('status-message');
    const directBtn = document.getElementById('btn-direct-link');

    if (filename) {
      // URL del archivo en Supabase Storage
      const supabaseUrl = 'https://tdnrdvnqqpfmgarlozzu.supabase.co/storage/v1/object/public/pdfs/' + encodeURIComponent(filename);
      
      statusMsg.innerHTML = 'Abriendo su documento de forma segura...<br><span style="font-size: 12px; color: #64748b;">Redireccionando automáticamente...</span>';
      
      // Mostrar botón de respaldo por si falla la redirección automática
      directBtn.href = supabaseUrl;
      directBtn.style.display = 'inline-flex';

      // Redireccionar
      setTimeout(() => {
        window.location.replace(supabaseUrl);
      }, 1500); // 1.5 segundos para mostrar el efecto premium
    } else {
      statusMsg.innerHTML = '⚠️ No se especificó ningún documento válido.<br><span style="font-size: 12px; color: #64748b;">Redireccionando a la página principal...</span>';
      setTimeout(() => {
        window.location.replace('https://dasilvamecanica.github.io/clientes/');
      }, 3000);
    }
  </script>
</body>
</html>
