<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando Documento...</title>
  <link rel="icon" type="image/png" href="logo2.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6; /* Fondo gris simple y limpio */
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      max-width: 400px;
      width: 85%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo-img {
      height: 48px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
    }
    .loading-container {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
      color: #4b5563;
      margin-top: 10px;
    }
    /* Spinner de carga simple */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid #e5e7eb;
      border-top-color: #4b5563;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn-direct {
      background-color: #4b5563;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 13.5px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.15s ease;
      margin-top: 15px;
      display: none;
    }
    .btn-direct:hover {
      background-color: #374151;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Intenta cargar primero el logo largo -->
    <img id="logo-wide" src="logo.png" alt="Logo" class="logo-img">
    
    <div class="loading-container">
      <div class="spinner"></div>
      <span id="status-text">Cargando documento...</span>
    </div>

    <a href="#" class="btn-direct" id="btn-direct-link">
      Abrir directamente
    </a>
  </div>

  <script>
    // Parámetros de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const filename = urlParams.get('file');

    const logoWide = document.getElementById('logo-wide');
    const statusText = document.getElementById('status-text');
    const directBtn = document.getElementById('btn-direct-link');

    // Intentar recuperar el logo personalizado del taller
    // 1. Si estamos en el navegador del dueño, lo tomará de localStorage
    const cachedLogo = localStorage.getItem('taller_logo_wide');
    if (cachedLogo) {
      logoWide.src = cachedLogo;
    } else {
      // 2. Si no, intentamos cargarlo desde la URL pública de Supabase Storage
      const supabaseLogoUrl = 'https://tdnrdvnqqpfmgarlozzu.supabase.co/storage/v1/object/public/pdfs/logo_wide.png';
      
      const tempImg = new Image();
      tempImg.onload = function() {
        logoWide.src = supabaseLogoUrl;
      };
      tempImg.onerror = function() {
        // 3. Si falla, mantendrá el src="logo.png" por defecto
        console.log("No se encontró un logo personalizado en Supabase Storage. Usando logo por defecto.");
      };
      tempImg.src = supabaseLogoUrl;
    }

    if (filename) {
      const supabaseUrl = 'https://tdnrdvnqqpfmgarlozzu.supabase.co/storage/v1/object/public/pdfs/' + encodeURIComponent(filename);
      
      statusText.innerText = 'Abriendo documento...';
      directBtn.href = supabaseUrl;
      directBtn.style.display = 'inline-block';

      // Redirección
      setTimeout(() => {
        window.location.replace(supabaseUrl);
      }, 1200);
    } else {
      statusText.innerText = 'Documento no especificado. Redireccionando...';
      setTimeout(() => {
        window.location.replace('https://dasilvamecanica.github.io/clientes/');
      }, 2500);
    }
  </script>
</body>
</html>
